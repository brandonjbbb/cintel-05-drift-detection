# ============================================================
# zensical.toml (Zensical configuration file)
# ============================================================

# WHY: Centralizes project documentation configuration.
# Zensical is a drop-in replacement for MkDocs that provides AI-assisted docstring generation and enhanced documentation features.
# It is used in this project to streamline documentation and provide better support for docstring generation.

[project]
site_name = "Continuous Intelligence - Drift Detection"
site_url = "https://brandonjbbb.github.io/cintel-05-drift-detection/"
repo_url = "https://github.com/brandonjbbb/cintel-05-drift-detection"
repo_name = "brandonjbbb/cintel-05-drift-detection"
site_description = "Documentation for a continuous intelligence drift detection project"
docs_dir = "docs"
site_dir = "site"
edit_uri = "edit/main/docs/"

[project.extra]
social = [
    { icon = "fontawesome/brands/github", link = "https://github.com/brandonjbbb/cintel-05-drift-detection" },
]

[project.plugins.search]
lang = "en"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
show_root_toc_entry = true
show_signature_annotations = true
separate_signature = true

[project.theme]
features = [
    "navigation.tracking",
    "navigation.expand",
    "navigation.path",
    "navigation.prune",
    "navigation.indexes",
    "toc.follow",
    "toc.integrate",
    "navigation.top",
]

nav = [
    { "Home" = "index.md" },
    { "Project Overview" = "project-overview.md" },
    { "Results" = "results.md" },
    { "Project Instructions" = "project-instructions.md" },
    { "Your Files" = "your-files.md" },
    { "Glossary" = "glossary.md" },
]
